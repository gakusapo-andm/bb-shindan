// このフォームは「顧客企業の採用担当者・上層部」が BB診断の打ち合わせ前に入力する。
// BB診断本体（Index-v51.html）からURLを発行し、顧客にメール等で送付する。
// 入力データはBB診断の「事前データ取込」で吸い上げ、診断のベースデータになる。
//
// 【データフロー】
// BB診断でURL発行 → 顧客がこのフォームで入力 → pre_inputs テーブルに保存
// → BB診断で「事前データ取込」→ BB側のcurrentDataにマージ
//
// 【URL設計】
// 担当者用: ?id={inquiry_no}&tk={token}&size={small|medium|large}
// 上層部用: ?id={inquiry_no}&tk={token}&size={...}&role=exec
// トークン: hash(id + 'gksp2026') → base36 8文字。BB診断のgeneratePreInputToken()と同一。
// size: BB診断のgetCompanySizeCategory()と同一スケール (small≤100, medium=101-300, large=301+)
//
// 【担当者 vs 上層部の分離設計】
// 同じpre_inputsレコードを共有する（customer_id=inquiry_noで1:1）。
// 担当者は全ステップ入力、上層部は問診のみ。
// read-merge-write（fix#7）で互いのデータを壊さずに保存する。
// 上層部がexecutiveAnswers/executiveCompletedだけ書き、担当者のデータはDB最新値を維持。
//
// 【認証モデル】
// Supabase anon key + RLSポリシー（pre_inputs_anon_select/insert/update）。
// URLトークンはアプリ層バリデーション。DBレベルの認証はなし（顧客はログイン不要）。
//
// 【保存方式】
// upsert ON CONFLICT customer_id — fix#4(問診完了即保存)とgoNextの同時実行で409を防ぐ。
// DBカラム status は JSON内の status と同期（fix#2）。
// '未開始'→'入力済み'→'完了' / '上層部完了'
//
// ============================================================
// v2: Supabase統合DB対応版
// v2.1: getQuestionMasterPublic/getRecruitmentMethodsPublic にフラット→ネスト変換追加（v50 SUPA_HANDLERS同等）
// v3: URLトークン認証(?tk=), 企業規模URL指定(?size=), 担当者/上層部URL分離(?role=exec), 課題・挑戦ステップ追加
// v3.1: バグ修正4件 + 運用改善5件 + hotfix(upsert, UNIQUE CONSTRAINT, 選考ステップ数, 課題マッピング)
//   fix#1: リトライ時loading復元, fix#2: DB status同期, fix#3: 最終ステップ二重保存防止,

//   fix#7: 同時編集read-merge-write, fix#8: beforeunload警告, fix#9: phaseLabelsフォールバック明示
//   hotfix: upsert化(409解消), customer_id UNIQUE CONSTRAINT, 選考ステップ数セレクター追加
(function() {
  const params = new URLSearchParams(window.location.search);
  window.SUPABASE_CONFIG = {
    url: 'https://vsikhvtlizshrlpyjlgm.supabase.co',
    anonKey: 'sb_publishable_Tu2UxhRYKM56vgpNkdkXIA_ZEgtKepN',
  };
  // GAS_CONFIG互換（customerId取得のために維持）
  window.GAS_CONFIG = {
    gasUrl: window.SUPABASE_CONFIG.url,
    customerId: params.get('id') || '',
    token: params.get('tk') || '',
    companySize: params.get('size') || '',  // small|medium|large
    role: params.get('role') || 'staff',    // staff|exec
    deploymentMode: 'standalone'
  };
  // v3: URLトークン生成・検証（BB診断側と同じアルゴリズム）
  window.generatePreInputToken = function(id) {
    var s = id + 'gksp2026';
    var h = 0;
    for (var i = 0; i < s.length; i++) {
      h = ((h << 5) - h) + s.charCodeAt(i);
      h = h & h;
    }
    return Math.abs(h).toString(36).padStart(8, '0').slice(0, 8);
  };
})();

const ToastContext = React.createContext(null);

const ToastProvider = ({ children }) => {
  const [toasts, setToasts] = useState([]);
  const idRef = useRef(0);
  const addToast = useCallback((message, type = 'success', duration = 2800) => {
    const id = ++idRef.current;
    setToasts(prev => [...prev, { id, message, type, duration }]);
  }, []);
  const removeToast = useCallback((id) => setToasts(prev => prev.filter(t => t.id !== id)), []);
  return (
    <ToastContext.Provider value={addToast}>
      {children}
      <div style={{ position:'fixed', bottom:'24px', left:'50%', transform:'translateX(-50%)', zIndex:9998, display:'flex', flexDirection:'column', gap:'8px', alignItems:'center', pointerEvents:'none' }}>
        {toasts.map(t => <ToastItem key={t.id} toast={t} onDone={() => removeToast(t.id)} />)}
      </div>
    </ToastContext.Provider>
  );
};

const ToastItem = ({ toast, onDone }) => {
  const [exiting, setExiting] = useState(false);
  useEffect(() => { const t = setTimeout(() => setExiting(true), toast.duration || 2800); return () => clearTimeout(t); }, []);
  useEffect(() => { if (exiting) { const t = setTimeout(onDone, 300); return () => clearTimeout(t); } }, [exiting]);
  const colors = { success: '#059669', error: '#dc2626', info: '#2563eb', warning: '#d97706' };
  const icons = { success: '✓', error: '✕', info: 'ℹ', warning: '⚠' };
  return (
    <div className={exiting ? 'toast-exit' : 'toast-enter'} style={{ pointerEvents:'auto', padding:'12px 20px', borderRadius:'12px', boxShadow:'0 10px 40px rgba(0,0,0,0.2)', display:'flex', alignItems:'center', gap:'10px', fontSize:'14px', fontWeight:500, color:'#fff', background: colors[toast.type] || colors.info }}>
      <span style={{ width:'24px', height:'24px', borderRadius:'50%', background:'rgba(255,255,255,0.2)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'11px', fontWeight:700, flexShrink:0 }}>{icons[toast.type] || 'ℹ'}</span>
      {toast.message}
    </div>
  );
};

const useToast = () => {
  const ctx = React.useContext(ToastContext);
  return ctx || ((msg) => { console.log('[Toast]', msg); });

// v3: ステップ定義（role/sizeに応じて動的生成）
// 【設計意図】
// 担当者と上層部で完全に異なるフローを提供する。
// 担当者: 企業規模→職種→ターゲット→手法→課題→問診→ファネル の7ステップ（size指定済みなら6）
// 上層部: 問診のみ1ステップ（担当者が入力した前提データは共有、上層部自身の回答のみ収集）
// この分離により:
//  - 上層部の負担を最小化（10-15分で完了）
//  - 担当者と上層部の回答を独立収集 → BB診断で「認識ギャップ」を可視化
const STEP_DEFS = {
  companySize: { id: 'companySize', label: '企業規模', icon: 'building' },
  jobType: { id: 'jobType', label: '採用職種', icon: 'briefcase' },
  target: { id: 'target', label: 'ターゲット学生', icon: 'graduationCap' },
  method: { id: 'method', label: '採用手法', icon: 'signal' },
  challenges: { id: 'challenges', label: '課題・挑戦', icon: 'lightBulb' },
  staff: { id: 'staff', label: '担当者問診', icon: 'user' },
  executive: { id: 'executive', label: '上層部問診', icon: 'tie' },
  funnel: { id: 'funnel', label: 'ファネル数値', icon: 'chartBar' },
};

function buildSteps(role, hasUrlSize) {
  let steps;
  if (role === 'exec') {
    steps = [STEP_DEFS.executive];
  } else {
    steps = [];
    if (!hasUrlSize) steps.push(STEP_DEFS.companySize);
    steps.push(STEP_DEFS.jobType, STEP_DEFS.target, STEP_DEFS.method);
    steps.push(STEP_DEFS.challenges);
    steps.push(STEP_DEFS.staff, STEP_DEFS.funnel);
  }
  return steps.map((s, i) => ({ ...s, num: i + 1 }));
}

// ========================================
// API通信（v2: Supabase直接クエリ）
// ========================================
// 【設計意図】
// 事前問診はBB診断のSupabase anonKeyを共有して直接クエリする。
// GASを経由しない。これにより:
//  - 顧客がログイン不要（anon RLSポリシーで制御）
//  - BB診断と同じDBを参照するので問診マスター/採用手法マスターが常に最新
//  - レイテンシが低い（GAS経由のコールドスタート問題を回避）
// トレードオフ: anonKeyがフロントに露出するが、RLSで書き込み範囲を制限。

// Supabase準備待機ヘルパー
async function ensureSupabase() {
  for (let i = 0; i < 50; i++) {
    if (window._supabase) return window._supabase;
    await new Promise(r => setTimeout(r, 100));
  }
  throw new Error('Supabase未初期化（5秒タイムアウト）');
}

const gasGet = async (action, params = {}) => {
  try {
    const sb = await ensureSupabase();
    console.log('[API GET] ' + action + ' Supabaseクエリ送信...');
    
    const handlers = {
      ping: async () => ({ success: true, message: 'pong (Supabase)' }),
      
      getCustomerPreInput: async () => {
        const id = params.id;
        if (!id) return { success: false, error: 'IDがありません' };
        const { data, error } = await sb.from('pre_inputs')
          .select('*')
          .eq('customer_id', id)
          .maybeSingle();
        if (error) throw error;
        if (!data) return { success: true, data: null };
        return { success: true, data: data.input_data || {} };
      },
      
      getQuestionMasterPublic: async () => {
        const { data, error } = await sb.from('questions').select('*').order('sort_order');
        if (error) throw error;
        const rows = data || [];
        if (rows.length === 0) return { success: true, data: null };
        // v50同等: フラット行 → ネスト構造に変換
        const nested = { base: {}, recruitmentMethod: {}, industry: {}, targetLayer: {}, depth: {} };
        rows.forEach(row => {
          const qObj = {
            id: row.question_id || '', question: row.question_text || '',
            choiceA: row.choice_a || '', choiceB: row.choice_b || '',
            studentQuestion: row.student_question || '',
            studentChoiceA: row.student_choice_a || '', studentChoiceB: row.student_choice_b || '',
            correctAnswer: row.correct_answer || 'A', points: row.points || 2,
            axisType: row.axis_type || '', axisKey: row.axis_key || '',
            gapCheck: row.gap_check || false, depthKey: row.depth_phase || null
          };
          const section = row.section || 'base';
          const role = row.role || 'staff';
          if (section === 'base') {
            const size = row.company_size || 'small';
            if (!nested.base[size]) nested.base[size] = {};
            if (!nested.base[size][role]) nested.base[size][role] = [];
            nested.base[size][role].push(qObj);
          } else if (section === 'recruitmentMethod') {
            const cat = row.method_category || '';
            if (!nested.recruitmentMethod[cat]) nested.recruitmentMethod[cat] = {};
            if (!nested.recruitmentMethod[cat][role]) nested.recruitmentMethod[cat][role] = [];
            nested.recruitmentMethod[cat][role].push(qObj);
          } else if (section === 'industry') {
            const ind = row.industry || '';
            const sz = row.company_size || 'small';
            if (!nested.industry[ind]) nested.industry[ind] = {};
            if (!nested.industry[ind][sz]) nested.industry[ind][sz] = {};
            if (!nested.industry[ind][sz][role]) nested.industry[ind][sz][role] = [];
            nested.industry[ind][sz][role].push(qObj);
          } else if (section === 'targetLayer') {
            const layer = row.target_layer || '';
            if (!nested.targetLayer[layer]) nested.targetLayer[layer] = {};
            if (!nested.targetLayer[layer][role]) nested.targetLayer[layer][role] = [];
            nested.targetLayer[layer][role].push(qObj);
          } else if (section === 'depth') {
            const phase = row.depth_phase || '';
            if (!nested.depth[phase]) nested.depth[phase] = {};
            if (!nested.depth[phase][role]) nested.depth[phase][role] = [];
            nested.depth[phase][role].push(qObj);
          }
        });
        return { success: true, data: nested };
      },
      
      getRecruitmentMethodsPublic: async () => {
        const { data, error } = await sb.from('recruitment_methods').select('*');
        if (error) throw error;
        const rows = data || [];
        if (rows.length === 0) return { success: true, data: {} };
        // v50同等: フラット行 → { key: { name, category, ... } } に変換
        const nested = {};
        rows.forEach(row => {
          const key = row.key || '';
          if (!key) return;
          let targetLayers = row.target_layers;
          if (typeof targetLayers === 'string') {
            try { targetLayers = JSON.parse(targetLayers); } catch(e) { targetLayers = []; }
          }
          nested[key] = {
            name: row.name || '', category: row.category || '',
            targetLayers: Array.isArray(targetLayers) ? targetLayers : [],
            description: row.description || '',
            phaseMapping: {
              surface: parseFloat(row.phase_surface) || 0,
              middle: parseFloat(row.phase_middle) || 0,
              deep: parseFloat(row.phase_deep) || 0
            }
          };
        });
        return { success: true, data: nested };
      },
    };
    
    const handler = handlers[action];
    if (!handler) {
      console.warn('[API GET] 未対応アクション: ' + action);
      return { success: false, error: '未対応: ' + action };
    }
    
    const result = await handler();
    console.log('[API GET] ' + action + ' 結果: success=' + result.success);
    return result;
  } catch (err) {
    console.error('[API GET] ' + action + ':', err);
    return { success: false, error: err.message };
  }
};

const gasPost = async (action, body = {}) => {
  try {
    const sb = await ensureSupabase();
    console.log('[API POST] ' + action + ' Supabaseクエリ送信...');
    
    const handlers = {
      // 【保存戦略】
      // 全保存を常にupsert ON CONFLICT customer_id で実行。
      // SELECT→IF/ELSE分岐を廃止し、INSERT/UPDATE競合を根本的に解消。
      // fix#4(問診完了即保存)とgoNext(最終ステップ保存)が同時発火しても安全。
      saveCustomerPreInput: async () => {
        const customerId = body.id || body.customerId;
        const inputData = body.preInputData || body.inputData || {};
        if (!customerId) return { success: false, error: 'IDがありません' };
        
        // read: 既存データを読む（ロール別マージ用）
        const existing = await sb.from('pre_inputs')
          .select('id, input_data')
          .eq('customer_id', customerId)
          .maybeSingle();
        
        // merge: ロール別マージ（fix#7）
        let merged = inputData;
        if (existing.data?.input_data) {
          const current = existing.data.input_data;
          const role = window.GAS_CONFIG.role || 'staff';
          if (role === 'exec') {
            merged = {
              ...current,
              executiveAnswers: inputData.executiveAnswers || {},
              executiveCompleted: inputData.executiveCompleted || false,
            };
          } else {
            merged = {
              ...inputData,
              executiveAnswers: current.executiveAnswers || inputData.executiveAnswers || {},
              executiveCompleted: current.executiveCompleted || inputData.executiveCompleted || false,
            };
          }
        }
        
        // DB status同期（fix#2）
        const dbStatus = merged.status === '完了' ? '完了'
          : merged.executiveCompleted ? '上層部完了'
          : '入力済み';
        
        // write: 常にupsert（INSERT or UPDATE on conflict）
        const { error } = await sb.from('pre_inputs')
          .upsert(
            { customer_id: customerId, input_data: merged, status: dbStatus },
            { onConflict: 'customer_id' }
          );
        if (error) throw error;
        return { success: true };
      },
    };
    
    const handler = handlers[action];
    if (!handler) {
      console.warn('[API POST] 未対応アクション: ' + action);
      return { success: false, error: '未対応: ' + action };
    }
    
    const result = await handler();
    console.log('[API POST] ' + action + ' 結果: success=' + result.success);
    return result;
  } catch (err) {
    console.error('[API POST] ' + action + ':', err);
    return { success: false, error: err.message };
  }
};

// タイマーコンポーネント
// ========================================
const CountdownTimer = ({ totalSeconds, onTimeUp, isRunning }) => {
  const [remaining, setRemaining] = useState(totalSeconds);
  const intervalRef = useRef(null);
  
  useEffect(() => {
    if (!isRunning) return;
    setRemaining(totalSeconds);
    intervalRef.current = setInterval(() => {
      setRemaining(prev => {
        if (prev <= 1) {
          clearInterval(intervalRef.current);
          onTimeUp();
          return 0;
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(intervalRef.current);
  }, [isRunning, totalSeconds]);
  
  const minutes = Math.floor(remaining / 60);
  const seconds = remaining % 60;
  const pct = (remaining / totalSeconds) * 100;
  const isLow = remaining <= 60;
  const isVeryLow = remaining <= 30;
  
  return (
    <div className={`flex items-center gap-3 px-4 py-2 rounded-xl border-2 ${
      isVeryLow ? 'bg-red-50 border-red-300 timer-pulse' : 
      isLow ? 'bg-orange-50 border-orange-300' : 
      'bg-blue-50 border-blue-200'
    }`}>
      <svg className="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <div className="flex-1">
        <div className="h-1.5 bg-gray-200 rounded-full overflow-hidden">
          <div className={`h-full rounded-full transition-all duration-1000 ${
            isVeryLow ? 'bg-red-500' : isLow ? 'bg-orange-500' : 'bg-blue-500'
          }`} style={{ width: `${pct}%` }} />
        </div>
      </div>
      <span className={`font-mono font-bold text-lg min-w-[60px] text-right ${
        isVeryLow ? 'text-red-600' : isLow ? 'text-orange-600' : 'text-blue-700'
      }`}>
        {String(minutes).padStart(2,'0')}:{String(seconds).padStart(2,'0')}
      </span>
    </div>
  );
};

// ========================================
// Step 3: 採用手法
// ========================================
const StepMethod = ({ data, onChange, methodMaster }) => {
  const methods = methodMaster && Object.keys(methodMaster).length > 0 ? methodMaster : DEFAULT_RECRUITMENT_METHODS;
  const categories = [...new Set(Object.values(methods).map(m => m.category))].sort();
  
  // 選択済み手法を優先順位順にソート
  const activeMethods = Object.entries(data.recruitmentMethods || {})
    .filter(([_, m]) => m?.active)
    .sort((a, b) => (a[1].priority || 999) - (b[1].priority || 999));
  
  const movePriority = (key, direction) => {
    const current = [...activeMethods];
    const idx = current.findIndex(([k]) => k === key);
    if (idx < 0) return;
    const swapIdx = idx + direction;
    if (swapIdx < 0 || swapIdx >= current.length) return;
    
    // swap priorities
    const updated = { ...data.recruitmentMethods };
    const pA = updated[current[idx][0]].priority || (idx + 1);
    const pB = updated[current[swapIdx][0]].priority || (swapIdx + 1);
    updated[current[idx][0]] = { ...updated[current[idx][0]], priority: pB };
    updated[current[swapIdx][0]] = { ...updated[current[swapIdx][0]], priority: pA };
    onChange({ ...data, recruitmentMethods: updated });
  };
  
  // チェック時に自動で優先順位を付与
  const toggleMethod = (key, checked) => {
    const updated = { ...data.recruitmentMethods };
    if (checked) {
      const maxPriority = Math.max(0, ...Object.values(updated).filter(m => m?.active).map(m => m.priority || 0));
      updated[key] = { ...updated[key], active: true, priority: maxPriority + 1 };
    } else {
      updated[key] = { ...updated[key], active: false, priority: undefined };
      // 残りの優先順位を詰める
      const remaining = Object.entries(updated).filter(([_, m]) => m?.active).sort((a, b) => (a[1].priority || 999) - (b[1].priority || 999));
      remaining.forEach(([k], i) => { updated[k] = { ...updated[k], priority: i + 1 }; });
    }
    onChange({ ...data, recruitmentMethods: updated });
  };
  
  return (
    <div className="glass-card rounded-2xl p-6 animate-in">
      <h2 className="text-xl font-bold text-gray-800 mb-2">利用中の採用手法を選択</h2>
      <p className="text-sm text-gray-500 mb-6">現在利用している、または利用を検討している手法をすべてチェックしてください</p>
      
      {categories.map(category => {
        const catMethods = Object.entries(methods).filter(([_, m]) => m.category === category);
        if (catMethods.length === 0) return null;
        
        return (
          <div key={category} className="mb-5">
            <h4 className="text-sm font-bold text-gray-700 mb-2 flex items-center gap-2">
              <span className="w-1.5 h-1.5 bg-blue-500 rounded-full"></span>
              {category}
            </h4>
            <div className="space-y-1">
              {catMethods.map(([key, method]) => {
                const active = data.recruitmentMethods?.[key]?.active || false;
                return (
                  <label key={key} className={`flex items-center gap-3 p-3 rounded-xl cursor-pointer transition ${
                    active ? 'bg-blue-50 border border-blue-200' : 'bg-gray-50 hover:bg-gray-100'
                  }`}>
                    <input
                      type="checkbox"
                      checked={active}
                      onChange={e => toggleMethod(key, e.target.checked)}
                      className="w-5 h-5 rounded border-gray-300 text-blue-600"
                    />
                    <span className={`font-medium ${active ? 'text-blue-800' : 'text-gray-600'}`}>
                      {method.name}
                    </span>
                  </label>
                );
              })}
            </div>
          </div>
        );
      })}
      
      {/* 優先順位の並び替え */}
      {activeMethods.length > 0 && (
        <div className="mt-6 pt-6 border-t border-gray-200">
          <h3 className="text-sm font-bold text-gray-700 mb-2 flex items-center gap-2">
            <SolidIcon name="chartBar" className="w-4 h-4 text-indigo-500" />
            注力度の優先順位
          </h3>
          <p className="text-xs text-gray-500 mb-3">上にあるほど優先度が高くなります。矢印ボタンで並べ替えてください。</p>
          <div className="space-y-1.5">
            {activeMethods.map(([key, methodData], idx) => {
              const methodDef = methods[key] || {};
              return (
                <div key={key} className="flex items-center gap-2 p-2.5 bg-white border border-gray-200 rounded-xl">
                  <span className="w-7 h-7 flex items-center justify-center bg-indigo-100 text-indigo-700 text-xs font-bold rounded-full flex-shrink-0">
                    {idx + 1}
                  </span>
                  <span className="flex-1 text-sm font-medium text-gray-800 truncate">{methodDef.name || key}</span>
                  <div className="flex gap-1">
                    <button
                      onClick={() => movePriority(key, -1)}
                      disabled={idx === 0}
                      className={`w-7 h-7 flex items-center justify-center rounded-lg text-xs transition ${
                        idx === 0 ? 'text-gray-300' : 'text-gray-500 hover:bg-gray-100'
                      }`}
                    >
                      <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth={2.5}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M5 15l7-7 7 7" />
                      </svg>
                    </button>
                    <button
                      onClick={() => movePriority(key, 1)}
                      disabled={idx === activeMethods.length - 1}
                      className={`w-7 h-7 flex items-center justify-center rounded-lg text-xs transition ${
                        idx === activeMethods.length - 1 ? 'text-gray-300' : 'text-gray-500 hover:bg-gray-100'
                      }`}
                    >
                      <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth={2.5}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7" />
                      </svg>
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
};

// ========================================
// Step 4 & 5: 問診（共通）
// ========================================
// 【設計意図】
// 15分タイマー付きのA/B択一問診。直感回答を促す設計。
// 質問セットは企業規模(size) × ターゲット層 × 採用手法カテゴリで動的に構築される。
// タイマー終了で自動締切 → fix#4で即DB保存 → ブラウザ閉じても回答が失われない。
// 「回答できない場合は飛ばしてよい」を明示し、無回答もデータとして扱う（無回答率も診断指標）。
// 担当者問診と上層部問診は同じコンポーネントを roleKey='staff'/'executive' で切り替え。
// 両者の回答を照合して「組織内認識ギャップ」をBB診断で可視化するのが最終目的。
const StepQuestionnaire = ({ data, onChange, roleKey, questions, title, timerSeconds = 900, onQuizActive, onComplete, optional = false, optionalNote = '' }) => {
  const [timerStarted, setTimerStarted] = useState(false);
  const [timeUp, setTimeUp] = useState(false);
  const [quizFinished, setQuizFinished] = useState(false);
  const [confirming, setConfirming] = useState(false);
  const [skipping, setSkipping] = useState(false);
  const completedKey = `${roleKey}Completed`;
  const skippedKey = `${roleKey}Skipped`;
  const answersKey = `${roleKey}Answers`;
  const answers = data[answersKey] || {};
  const answeredCount = Object.keys(answers).filter(k => answers[k]).length;
  
  // v3.1 fix#8: 問診中のブラウザ閉じ・リロード防止
  useEffect(() => {
    if (!timerStarted || timeUp || quizFinished) return;
    const handler = (e) => { e.preventDefault(); e.returnValue = ''; };
    window.addEventListener('beforeunload', handler);
    return () => window.removeEventListener('beforeunload', handler);
  }, [timerStarted, timeUp, quizFinished]);
  
  // 完了判定: フラグ + 実際に回答がある場合のみ「回答済み」とする
  const isAlreadyCompleted = data[completedKey] === true && answeredCount > 0;
  
  // タイムアップまたは全問回答 → 自動確定（条件付きreturnの前に配置必須）
  useEffect(() => {
    if (!(timeUp || quizFinished) || confirming) return;
    setConfirming(true);
    const newData = { ...data, [completedKey]: true };
    onChange(newData);
    // v3.1 fix#4: 問診完了時に即座にDB保存（ブラウザ閉じ対策）
    (async () => {
      try { await API.savePreInput(newData); }
      catch(e) { console.error('[問診完了保存エラー]', e); }
    })();
    if (onQuizActive) onQuizActive(false);
    if (onComplete) onComplete(newData);
  }, [timeUp, quizFinished]);
  
  // 質問が0件の場合
  if (!questions || questions.length === 0) {
    return (
      <div className="glass-card rounded-2xl p-6 animate-in text-center">
        <div className="flex justify-center mb-4"><SolidIcon name="warning" className="w-16 h-16 text-amber-400" /></div>
        <h2 className="text-xl font-bold text-gray-800 mb-2">{title}</h2>
        <p className="text-gray-600 mb-2">
          問診の設問が読み込まれていません。
        </p>
        <p className="text-sm text-gray-400">
          「次へ」を押してスキップしてください。<br />
          お打ち合わせ当日に問診を実施します。
        </p>
      </div>
    );
  }
  
  // 既に回答完了済みの場合
  if (isAlreadyCompleted) {
    return (
      <div className="glass-card rounded-2xl p-6 animate-in text-center">
        <div className="flex justify-center mb-4"><SolidIcon name="checkCircle" className="w-16 h-16 text-green-500" /></div>
        <h2 className="text-xl font-bold text-gray-800 mb-2">{title} — 回答済み</h2>
        <p className="text-gray-600 mb-2">
          この問診は既に回答が完了しています。（{answeredCount}/{questions.length}問回答）
        </p>
        <p className="text-sm text-gray-400">
          回答内容の変更はできません。「次へ」を押して進んでください。
        </p>
      </div>
    );
  }
  
  // スキップ済みの場合（任意問診のみ）
  if (optional && data[skippedKey]) {
    return (
      <div className="glass-card rounded-2xl p-6 animate-in text-center">
        <div className="flex justify-center mb-4"><SolidIcon name="info" className="w-16 h-16 text-gray-400" /></div>
        <h2 className="text-xl font-bold text-gray-800 mb-2">{title} — スキップ済み</h2>
        <p className="text-gray-600 mb-2">
          この問診はスキップされました。
        </p>
        <p className="text-sm text-gray-400 mb-4">
          「次へ」を押して進んでください。回答する場合は下のボタンを押してください。
        </p>
        <button
          onClick={() => onChange({ ...data, [skippedKey]: false })}
          className="text-xs px-4 py-2 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 transition font-medium"
        >
          やっぱり回答する
        </button>
      </div>
    );
  }
  
  // 開始前の説明画面
  if (!timerStarted) {
    return (
      <div className="glass-card rounded-2xl p-6 animate-in">
        <h2 className="text-xl font-bold text-gray-800 mb-4">{title}</h2>
        
        {/* 任意問診の説明 */}
        {optional && optionalNote && (
          <div className="p-4 bg-blue-50 border border-blue-200 rounded-xl mb-4 space-y-2">
            <p className="text-sm text-blue-800 font-bold flex items-center gap-1.5">
              <SolidIcon name="info" className="w-4 h-4" />この問診は任意です
            </p>
            <p className="text-sm text-blue-700">{optionalNote}</p>
          </div>
        )}
        
        <div className="p-4 bg-amber-50 border border-amber-200 rounded-xl mb-4 space-y-2">
          <p className="text-sm text-amber-800 font-bold flex items-center gap-1.5"><SolidIcon name="clock" className="w-4 h-4" />制限時間: {timerSeconds / 60}分</p>
          <p className="text-sm text-amber-700">制限時間を過ぎると自動的に回答が締め切られます。</p>
          <p className="text-sm text-amber-700">
            <span className="font-bold inline-flex items-center gap-1"><SolidIcon name="lightbulb" className="w-4 h-4" />回答のヒント：</span>
            直感で「こちらに近い」と思う方を選択してください。
            <span className="font-bold text-amber-900">どちらにも回答できない場合は、選択せずに飛ばして構いません。</span>
          </p>
        </div>
        
        <div className="p-4 bg-red-50 border border-red-200 rounded-xl mb-6 space-y-2">
          <p className="text-sm text-red-800 font-bold flex items-center gap-1.5"><SolidIcon name="warning" className="w-4 h-4" />以下の点にご注意ください</p>
          <ul className="text-sm text-red-700 space-y-1">
            <li className="flex items-start gap-2">
              <SolidIcon name="prohibited" className="w-4 h-4 mt-0.5 text-red-500 flex-shrink-0" />
              <span><span className="font-bold">途中保存はできません。</span>開始したら最後まで続けてください。</span>
            </li>
            <li className="flex items-start gap-2">
              <SolidIcon name="prohibited" className="w-4 h-4 mt-0.5 text-red-500 flex-shrink-0" />
              <span><span className="font-bold">前のステップに戻ることはできません。</span>問診中は他の画面に移動できません。</span>
            </li>
            <li className="flex items-start gap-2">
              <SolidIcon name="prohibited" className="w-4 h-4 mt-0.5 text-red-500 flex-shrink-0" />
              <span><span className="font-bold">回答完了後のやり直しはできません。</span>一度提出した回答は変更できません。</span>
            </li>
          </ul>
        </div>
        
        <div className="text-center">
          <p className="text-gray-600 mb-4">全{questions.length}問の問診です</p>
          <button
            onClick={() => {
              setTimerStarted(true);
              if (onQuizActive) onQuizActive(true);
            }}
            className="btn-ripple px-8 py-4 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold text-lg rounded-2xl hover:from-blue-700 hover:to-indigo-700 transition shadow-lg hover:shadow-xl"
          >
            問診を開始する
          </button>
          {optional && (
            <button
              disabled={skipping}
              onClick={() => {
                if (skipping) return;
                setSkipping(true);
                const newData = { ...data, [skippedKey]: true };
                onChange(newData);
                if (onComplete) onComplete(newData);
              }}
              className="block mx-auto mt-4 text-sm px-6 py-2 text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-lg transition"
            >
              {skipping ? '保存中...' : 'この問診をスキップする →'}
            </button>
          )}
        </div>
      </div>
    );
  }
  
  // タイムアップまたは全問回答完了
  if (timeUp || quizFinished) {
    return (
      <div className="glass-card rounded-2xl p-6 animate-in text-center">
        <div className="flex justify-center mb-4">
          <svg className="w-12 h-12 animate-spin text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2}>
            <circle cx="12" cy="12" r="10" className="opacity-25" />
            <path d="M4 12a8 8 0 018-8" className="opacity-75" />
          </svg>
        </div>
        <p className="text-gray-600 font-bold">回答を保存中...</p>
      </div>
    );
  }
  
  // 問診回答画面
  return (
    <div className="animate-in">
      <div className="glass-card rounded-2xl p-4 mb-4 sticky top-0 z-10">
        <div className="flex items-center justify-between mb-2">
          <h2 className="text-lg font-bold text-gray-800">{title}</h2>
          <span className="text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-full">
            {answeredCount}/{questions.length}問回答
          </span>
        </div>
        <CountdownTimer
          totalSeconds={timerSeconds}
          isRunning={true}
          onTimeUp={() => setTimeUp(true)}
        />
        <div className="flex items-center justify-between mt-2">
          <p className="text-xs text-gray-400">
            <span className="inline-flex items-center gap-1"><SolidIcon name="lightbulb" className="w-3.5 h-3.5" />どちらにも回答できない場合は選択せずに飛ばしてください</span>
          </p>
          <button
            onClick={() => setQuizFinished(true)}
            disabled={quizFinished || confirming}
            className={`text-xs px-3 py-1 rounded-full transition font-bold flex items-center gap-1 ${
              quizFinished || confirming
                ? 'bg-gray-200 text-gray-400 cursor-wait'
                : 'bg-green-100 text-green-700 hover:bg-green-200'
            }`}
          >
            {(quizFinished || confirming) && (
              <svg className="w-3 h-3 flex-shrink-0" style={{ animation: 'spin 0.8s linear infinite' }} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2.5}>
                <circle cx="12" cy="12" r="10" className="opacity-25" /><path d="M4 12a8 8 0 018-8" className="opacity-75" />
              </svg>
            )}
            {quizFinished || confirming ? '保存中...' : '回答を終了する'}
          </button>
        </div>
      </div>
      
      <div className="space-y-3">
        {questions.map((q, idx) => {
          const answer = answers[q.id];
          return (
            <div key={q.id} className="glass-card rounded-xl p-4">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-xs px-2 py-0.5 bg-gray-100 text-gray-500 rounded-full">
                  Q{idx + 1}
                </span>
                {answer && (
                  <span className="text-xs px-2 py-0.5 bg-green-100 text-green-600 rounded-full">回答済</span>
                )}
              </div>
              <p className="text-sm font-medium text-gray-800 mb-3" style={{ whiteSpace: 'pre-line' }}>
                {q.question}
              </p>
              <div className="grid grid-cols-2 gap-3">
                <button
                  onClick={() => onChange({
                    ...data,
                    [answersKey]: { ...answers, [q.id]: answer === 'A' ? undefined : 'A' }

                    answer === 'A'
                      ? 'border-blue-500 bg-blue-100 text-blue-800'

      <div className="text-center mt-6">
        <button
          onClick={() => setQuizFinished(true)}
          disabled={quizFinished || confirming}
          className={`btn-ripple px-8 py-3 font-bold rounded-xl transition shadow-lg flex items-center gap-2 mx-auto ${
            quizFinished || confirming

            <svg className="w-4 h-4 flex-shrink-0" style={{ animation: 'spin 0.8s linear infinite' }} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2.5}>
              <circle cx="12" cy="12" r="10" className="opacity-25" /><path d="M4 12a8 8 0 018-8" className="opacity-75" />

          {quizFinished || confirming ? '保存中...' : '回答を終了する'}

};

// ========================================
// Step 6: ファネル数値
// ========================================
const StepFunnel = ({ data, onChange, methodMaster }) => {
  const methods = methodMaster && Object.keys(methodMaster).length > 0 ? methodMaster : DEFAULT_RECRUITMENT_METHODS;
  const jobLabels = data.jobType ? (JOB_TYPES.find(j => j.key === data.jobType)?.label || data.jobType) : '';
  const activeChannels = Object.entries(data.recruitmentMethods || {})
    .filter(([_, m]) => m?.active)
    .sort((a, b) => (a[1].priority || 999) - (b[1].priority || 999))
    .map(([key, m], idx) => ({
      key,
      name: methods[key]?.name || key,
      shortName: (methods[key]?.name || key).split('（')[0].substring(0, 8),
      category: methods[key]?.category || DEFAULT_RECRUITMENT_METHODS[key]?.category || '',
      priority: m.priority || (idx + 1)
    }));
  
  const funnelData = data.funnelData || {};
  const availableYears = funnelData.availableYears || ['25卒', '26卒', '27卒', '28卒', '29卒', '30卒'];
  const selectedYear = funnelData.selectedYear || '27卒';
  const yearData = funnelData.yearData?.[selectedYear] || {};
  
  const setSelectedYear = (year) => {
    onChange({ ...data, funnelData: { ...funnelData, selectedYear: year } });
  };
  
  // BB診断と同じフェーズキー
  const phases = [
    { key: 'awareness', label: '認知' },
    { key: 'interest', label: '興味' },
    { key: 'contact', label: '接触' },
    { key: 'screening', label: '選考' },
    { key: 'offer', label: '内々定' },
    { key: 'acceptance', label: '承諾' }
  ];
  
  const getPlaceholder = (phaseKey, channelKey) => {
    // 1. DBマスターのphaseLabels（v3.1 note#9: recruitment_methodsテーブルにphaseLabels列追加で解消予定）
    if (methods[channelKey]?.phaseLabels?.[phaseKey]) return methods[channelKey].phaseLabels[phaseKey];
    // 2. ローカルDEFAULTのphaseLabels（DB未対応手法のフォールバック）
    if (DEFAULT_RECRUITMENT_METHODS[channelKey]?.phaseLabels?.[phaseKey]) return DEFAULT_RECRUITMENT_METHODS[channelKey].phaseLabels[phaseKey];
    // 3. 最終フォールバック（DBに新規追加手法でDEFAULTにもない場合）
    const FALLBACK = { awareness: '認知数', interest: '興味数', contact: '接触数', screening: '選考参加数', offer: '内々定数', acceptance: '承諾数' };
    return FALLBACK[phaseKey] || '数値を入力';
  };
  
  // BB診断と同じ channelData 形式: {phase}_{channelKey}
  const getChannelValue = (phaseKey, channelKey) => yearData.channelData?.[`${phaseKey}_${channelKey}`] ?? '';
  
  const setChannelValue = (phaseKey, channelKey, value) => {
    const dataKey = `${phaseKey}_${channelKey}`;
    const newChannelData = {
      ...yearData.channelData,
      [dataKey]: value === '' ? '' : (parseInt(value) || 0)
    };
    
    // BB診断と同じキーで合計を再計算
    const calcTotal = (pk) => activeChannels.reduce((sum, ch) => {
      const v = newChannelData[`${pk}_${ch.key}`];
      return sum + (parseInt(v) || 0);
    }, 0);
    
    const totals = {
      targetAwareness: calcTotal('awareness'),
      interest: calcTotal('interest'),
      applications: calcTotal('contact'),
      screening: calcTotal('screening'),
      offers: calcTotal('offer'),
      acceptance: calcTotal('acceptance')
    };
    
    onChange({
      ...data,
      funnelData: {
        ...funnelData,
        ...totals,
        selectedYear: selectedYear,
        yearData: {
          ...funnelData.yearData,
          [selectedYear]: {
            ...yearData,
            ...totals,
            channelData: newChannelData
          }
        }
      }
    });
  };
  
  const calcTotal = (phaseKey) => activeChannels.reduce((sum, ch) => {
    const v = getChannelValue(phaseKey, ch.key);
    return sum + (parseInt(v) || 0);
  }, 0);
  
  return (
    <div className="glass-card rounded-2xl p-6 animate-in">
      <h2 className="text-xl font-bold text-gray-800 mb-2">採用ファネル数値</h2>
      
      <div className="p-3 bg-red-50 border border-red-200 rounded-xl mb-4">
        <p className="text-sm text-red-800">
          <span className="font-bold inline-flex items-center gap-1"><SolidIcon name="warning" className="w-4 h-4" />注意：</span>
          以下は<span className="font-bold">「{jobLabels || '選択した職種'}」</span>を採用する際の移行数値です。
          全社的な合計値ではなく、該当職種の採用に限った数値をご入力ください。
        </p>
      </div>
      
      {/* 年度選択 */}
      <div className="flex items-center gap-3 mb-4">
        <label className="text-sm font-bold text-gray-700">年度：</label>
        <div className="flex gap-1 p-1 bg-gray-100 rounded-lg overflow-x-auto flex-1">
          {availableYears.map(year => (
            <button
              key={year}
              onClick={() => setSelectedYear(year)}
              className={`px-3 py-1.5 text-xs font-medium rounded-md transition whitespace-nowrap ${
                selectedYear === year
                  ? 'bg-white text-blue-600 shadow-sm font-bold'
                  : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'
              }`}
            >
              {year}
              {funnelData.yearData?.[year]?.channelData && 
               Object.keys(funnelData.yearData[year].channelData).length > 0 && (
                <span className="ml-1 w-1.5 h-1.5 bg-green-500 rounded-full inline-block"></span>
              )}
            </button>
          ))}
        </div>
        <span className="text-xs text-blue-600 font-medium bg-blue-50 px-2 py-1 rounded whitespace-nowrap">
          {selectedYear}編集中
        </span>
      </div>
      
      {/* 採用目標人数 */}
      <div className="mb-6 p-4 bg-green-50 border border-green-200 rounded-xl">
        <label className="block text-sm font-bold text-green-800 mb-2">採用目標人数（承諾目標）</label>
        <div className="flex items-center gap-2">
          <input
            type="number"
            min="0"
            value={yearData.targetHires ?? funnelData.targetHires ?? ''}
            onChange={e => {
              const v = e.target.value === '' ? '' : (parseInt(e.target.value) || 0);
              onChange({
                ...data,
                funnelData: {
                  ...funnelData,
                  selectedYear: selectedYear,
                  yearData: {
                    ...funnelData.yearData,
                    [selectedYear]: { ...yearData, targetHires: v }
                  }
                }
              });
            }}
            placeholder="例: 5"
            className="w-32 px-4 py-3 border border-gray-300 rounded-xl text-center text-lg font-bold focus:ring-2 focus:ring-green-500"
          />
          <span className="text-gray-600 font-medium">人</span>
        </div>
      </div>
      
      {/* v3.1 hotfix: 選考ステップ数 */}
      <div className="mb-6 flex items-center gap-3">
        <label className="text-sm font-bold text-gray-700">選考ステップ数：</label>
        <select
          value={yearData.screeningSteps || funnelData.screeningSteps || 1}
          onChange={e => {
            const v = parseInt(e.target.value);
            onChange({
              ...data,
              funnelData: {
                ...funnelData,
                screeningSteps: v,
                selectedYear: selectedYear,
                yearData: {
                  ...funnelData.yearData,
                  [selectedYear]: { ...yearData, screeningSteps: v }
                }
              }
            });
          }}
          className="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500"
        >
          {[1,2,3,4,5].map(n => (
            <option key={n} value={n}>{n}段階</option>
          ))}
        </select>
        <span className="text-xs text-gray-500">（1次面接、2次面接など）</span>
      </div>
      
      {activeChannels.length === 0 ? (
        /* チャネル未選択時：合計入力フォーム */
        <div>
          <h3 className="text-sm font-bold text-gray-700 mb-3">各フェーズの合計人数</h3>
          <p className="text-xs text-gray-500 mb-4">「採用手法」ステップで手法を選択すると、手法別の入力ができます。</p>
          <div className="grid grid-cols-2 gap-3">
            {[
              { key: 'targetAwareness', label: '認知', ph: '例: 10000' },
              { key: 'interest', label: '興味', ph: '例: 1000' },
              { key: 'applications', label: '接触', ph: '例: 200' },
              { key: 'screening', label: '選考', ph: '例: 80' },
              { key: 'offers', label: '内々定', ph: '例: 10' },
              { key: 'acceptance', label: '承諾', ph: '例: 5' }
            ].map(item => (
              <div key={item.key}>
                <label className="block text-xs font-bold text-gray-700 mb-1">{item.label}</label>
                <input
                  type="number"
                  min="0"
                  value={yearData[item.key] ?? funnelData[item.key] ?? ''}
                  onChange={e => {
                    const v = e.target.value === '' ? '' : (parseInt(e.target.value) || 0);
                    onChange({
                      ...data,
                      funnelData: {
                        ...funnelData,
                        [item.key]: v,
                        selectedYear: selectedYear,
                        yearData: {
                          ...funnelData.yearData,
                          [selectedYear]: { ...yearData, [item.key]: v }
                        }
                      }
                    });
                  }}
                  placeholder={item.ph}
                  className="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500"
                />
              </div>
            ))}
          </div>
        </div>
      ) : (
        /* チャネル選択時：BB診断と同じテーブル形式 */
        <div>
          <h3 className="text-sm font-bold text-gray-700 mb-1">採用手法別ファネル数値</h3>
          <p className="text-xs text-gray-500 mb-4">各手法の数値を入力すると、合計が自動計算されます。不明な項目は空欄で構いません。</p>
          
          <div className="overflow-x-auto -mx-2 px-2">
            <table className="w-full border-collapse text-sm">
              <thead>
                <tr className="bg-gray-50">
                  <th className="border border-gray-200 px-2 py-2 text-left font-bold text-gray-700 w-20 sticky left-0 bg-gray-50 z-10">フェーズ</th>
                  <th className="border border-gray-200 px-2 py-2 text-center font-bold text-blue-700 bg-blue-50 w-16">合計</th>
                  {activeChannels.map(ch => (
                    <th key={ch.key} className="border border-gray-200 px-1 py-2 text-center font-medium text-gray-600" style={{minWidth: '90px'}}>
                      <div className="truncate text-xs" title={ch.name}>
                        <span className="text-[10px] text-purple-500 mr-0.5">{ch.priority}位</span>
                        {ch.shortName}
                      </div>
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {phases.map(phase => (
                  <tr key={phase.key}>
                    <td className="border border-gray-200 px-2 py-2 font-bold text-gray-800 bg-gray-50 text-xs sticky left-0 z-10">
                      {phase.label}
                    </td>
                    <td className="border border-gray-200 px-2 py-2 text-center font-bold text-blue-600 bg-blue-50">
                      {calcTotal(phase.key) || ''}
                    </td>
                    {activeChannels.map(ch => (
                      <td key={ch.key} className="border border-gray-200 px-1 py-1">
                        <input
                          type="number"
                          min="0"
                          value={getChannelValue(phase.key, ch.key)}
                          onChange={e => setChannelValue(phase.key, ch.key, e.target.value)}
                          placeholder={getPlaceholder(phase.key, ch.key)}
                          className="w-full px-1 py-1.5 border border-gray-200 rounded text-center text-xs focus:ring-2 focus:ring-blue-500 placeholder-gray-300"
                        />
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          
          {/* 合計サマリー */}
          <div className="mt-4 p-3 bg-blue-50 border border-blue-200 rounded-xl">
            <div className="grid grid-cols-6 gap-2 text-center">
              {phases.map(phase => (
                <div key={phase.key}>
                  <div className="text-[10px] text-gray-500">{phase.label}</div>
                  <div className="text-sm font-bold text-blue-700">{calcTotal(phase.key) || '-'}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// メインApp (v3.1: バグ修正4件 + 運用改善5件)

const App = () => {
  const toast = useToast();
  const urlRole = window.GAS_CONFIG.role || 'staff';
  const urlSize = window.GAS_CONFIG.companySize || '';
  const urlToken = window.GAS_CONFIG.token || '';
  const customerId = API.customerId;
  const isExec = urlRole === 'exec';
  
  const isTokenValid = useMemo(() => {
    if (!customerId || !urlToken) return false;
    return urlToken === window.generatePreInputToken(customerId);
  }, [customerId, urlToken]);
  
  const steps = useMemo(() => buildSteps(urlRole, !!urlSize), [urlRole, urlSize]);
  
  const [currentStep, setCurrentStep] = useState(0);
  const [data, setData] = useState({
    jobType: '', jobTypeOther: '', companySize: urlSize || '',
    targetLayers: {}, recruitmentMethods: {},
    staffAnswers: {}, executiveAnswers: {}, funnelData: {},
    challengeToSolve: '', pastAttempts: '', status: '入力中'
  });
  const [questionMaster, setQuestionMaster] = useState(null);
  const [methodMaster, setMethodMaster] = useState(null);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [navigating, setNavigating] = useState(false);
  const [completed, setCompleted] = useState(false);
  const [error, setError] = useState('');
  const [privacyAgreed, setPrivacyAgreed] = useState(false);
  const [started, setStarted] = useState(false);
  const [quizActive, setQuizActive] = useState(false);
  const maxRetries = 2;
  const [retryCount, setRetryCount] = useState(0);
  
  useEffect(() => {
    (async () => {
      // v3.1 fix#1: リトライ時にloading状態を復元
      if (retryCount > 0) setLoading(true);
      try {
        if (customerId && !isTokenValid) {
          setError('このURLは無効です。\n正しいURLを担当コンサルタントから受け取ってください。');
          setLoading(false); return;
        }
        if (!customerId) {
          setError('問い合わせ番号が指定されていません。\nURLに ?id=XXXXX&tk=YYYYY の形式でアクセスしてください。');
          setLoading(false); return;
        }
        console.log('[事前問診 v3.1] ロード role=' + urlRole + ' size=' + urlSize + ' id=' + customerId);
        const pingRes = await gasGet('ping');
        if (!pingRes.success) throw new Error('サーバーに接続できません。');
        
        const preRes = await API.loadPreInput();
        if (preRes.success && preRes.data) {
          const ld = { ...preRes.data };
          const sHas = Object.keys(ld.staffAnswers || {}).filter(k => ld.staffAnswers[k]).length > 0;
          const eHas = Object.keys(ld.executiveAnswers || {}).filter(k => ld.executiveAnswers[k]).length > 0;
          if (ld.staffCompleted && !sHas) ld.staffCompleted = false;
          if (ld.executiveCompleted && !eHas) ld.executiveCompleted = false;
          if (urlSize) ld.companySize = urlSize;
          setData(prev => ({ ...prev, ...ld }));
          if (isExec && ld.executiveCompleted) setCompleted(true);
          else if (!isExec && ld.status === '完了') setCompleted(true);
          // v3.1 fix#5: exec URLにsize指定なし＆担当者も未入力の場合は警告
          if (isExec && !urlSize && !ld.companySize) {
            console.warn('[事前問診 v3.1] 上層部アクセスだが企業規模が不明。フォールバック適用。');
          }
        } else if (isExec && !urlSize) {
          // v3.1 fix#5: 担当者の事前データも存在しない場合
          setError('担当者の方がまだ事前問診を開始していません。\n担当者の方の問診完了後に再度アクセスしてください。\n\n※URLに &size= パラメータが含まれている場合はこのメッセージは表示されません。');
          setLoading(false); return;
        }
        
        let qLoaded = false;
        for (let qa = 0; qa < 3 && !qLoaded; qa++) {
          const qRes = await API.loadQuestionMaster();
          if (qRes.success && qRes.data) { setQuestionMaster(qRes.data); qLoaded = true; }
          else if (qRes.success) { qLoaded = true; }
          else { if (qa < 2) await new Promise(r => setTimeout(r, 1500*(qa+1)));
            else setError('問診マスターの読み込みに失敗しました。\nページを再読み込みしてください。'); }
        }
        const mRes = await API.loadRecruitmentMethods();
        if (mRes.success && mRes.data) setMethodMaster(mRes.data);
      } catch (e) {
        if (retryCount < maxRetries) { setRetryCount(prev => prev + 1); return; }
        setError('データの読み込みに失敗しました。\n' + e.message);
      } finally { setLoading(false); }
    })();
  }, [retryCount]);
  
  const determinedSize = urlSize || data.companySize || '';
  
  const getQuestions = useCallback((roleKey) => {
    if (!questionMaster) return [];
    let questions = [];
    if (determinedSize) {
      const qs = questionMaster.base?.[determinedSize]?.[roleKey];
      if (qs && qs.length > 0) questions = [...qs];
    } else {
      for (const sz of ['small','medium','large']) {
        const qs = questionMaster.base?.[sz]?.[roleKey];
        if (qs && qs.length > 0) { questions = [...qs]; break; }
      }
    }
    Object.keys(data.targetLayers || {}).filter(k => data.targetLayers[k]?.enabled).forEach(layer => {
      questions = [...questions, ...(questionMaster.targetLayer?.[layer]?.[roleKey] || [])];
    });
    ['surface','middle','deep'].forEach(d => {
      questions = [...questions, ...(questionMaster.depth?.[d]?.[roleKey] || [])];
    });
    const mM = methodMaster && Object.keys(methodMaster).length > 0 ? methodMaster : DEFAULT_RECRUITMENT_METHODS;
    const actMethods = Object.keys(data.recruitmentMethods || {}).filter(k => data.recruitmentMethods[k]?.active);
    const actCats = [...new Set(actMethods.map(k => mM[k]?.category).filter(Boolean))];
    actCats.forEach(cat => {
      questions = [...questions, ...(questionMaster.recruitmentMethod?.[cat]?.[roleKey] || [])];
      Object.entries(questionMaster.recruitmentMethod || {}).forEach(([key, roles]) => {
        if (mM[key] && mM[key].category === cat) questions = [...questions, ...(roles?.[roleKey] || [])];
      });
    });
    const seen = new Set();
    return questions.filter(q => { if (seen.has(q.id)) return false; seen.add(q.id); return true; });
  }, [questionMaster, data.targetLayers, data.recruitmentMethods, methodMaster, determinedSize]);
  
  const saveProgress = useCallback(async (nd) => {
    setSaving(true);
    try { await API.savePreInput(nd || data); }
    catch (e) { toast('保存に失敗しました。', 'error', 4000); }
    finally { setSaving(false); }
  }, [data]);
  
  const goNext = async () => {
    if (navigating) return;
    setNavigating(true);
    try {
      window.scrollTo(0, 0);
      if (currentStep >= steps.length - 1) {
        // v3.1 fix#3: 最終ステップはfinalDataのみ保存（二重保存防止）
        const finalData = isExec ? { ...data, executiveCompleted: true } : { ...data, status: '完了' };
        setData(finalData); await saveProgress(finalData); setCompleted(true);
      } else {
        await saveProgress(data);
        setCurrentStep(prev => prev + 1);
      }
    } finally { setNavigating(false); }
  };
  const goPrev = () => {
    if (navigating) return; setNavigating(true);
    window.scrollTo(0, 0); setCurrentStep(prev => Math.max(0, prev - 1));
    setTimeout(() => setNavigating(false), 300);
  };
  
  const canProceed = useMemo(() => {
    const sid = steps[currentStep]?.id;
    if (sid === 'companySize') return !!data.companySize;
    if (sid === 'jobType') return !!data.jobType;
    if (sid === 'target') {
      const hasEnabled = Object.values(data.targetLayers || {}).some(v => v?.enabled);
      if (!hasEnabled) return false;
      // v3.1 fix#6: 比率入力がある場合は100%チェック
      const total = Object.values(data.targetLayers || {}).filter(v => v?.enabled).reduce((s, v) => s + (v?.ratio || 0), 0);
      if (total > 0 && total !== 100) return false;
      return true;
    }
    if (sid === 'method') return Object.values(data.recruitmentMethods || {}).some(v => v?.active);
    return true;
  }, [currentStep, data, steps]);
  
  const staffQuestions = useMemo(() => getQuestions('staff'), [getQuestions]);
  const executiveQuestions = useMemo(() => getQuestions('executive'), [getQuestions]);
  
  useEffect(() => {
    if (!questionMaster || !started) return;
    const chk = (rk, qs) => {
      if (!data[rk+'Completed']) return;
      const ans = data[rk+'Answers'] || {};
      const aIds = new Set(Object.keys(ans).filter(k => ans[k]));
      const cIds = new Set(qs.map(q => q.id));
      if ([...aIds].some(id => !cIds.has(id))) setData(p => ({ ...p, [rk+'Completed']: false, [rk+'Answers']: {} }));
    };
    if (!isExec) chk('staff', staffQuestions);
    if (isExec) chk('executive', executiveQuestions);
  }, [staffQuestions, executiveQuestions, questionMaster, started]);
  
  if (loading) return (<div className="min-h-screen flex items-center justify-center"><div className="text-center"><div className="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mx-auto mb-4"></div><p className="text-gray-600">読み込み中...</p></div></div>);
  if (error) return (<div className="min-h-screen flex items-center justify-center p-4"><div className="glass-card rounded-2xl p-8 text-center max-w-md"><div className="flex justify-center mb-4"><SolidIcon name="warning" className="w-14 h-14 text-amber-500" /></div><p className="text-red-600 font-bold mb-4 whitespace-pre-line">{error}</p><button onClick={() => window.location.reload()} className="px-6 py-3 bg-blue-600 text-white rounded-xl font-bold">再読み込み</button></div></div>);
  if (completed) return (<div className="min-h-screen flex items-center justify-center p-4"><CompletionScreen /></div>);
  
  if (!started) {
    return (
      <div className="max-w-2xl mx-auto px-4 py-8">
        <div className="glass-card rounded-2xl p-8 animate-in">
          <div className="text-center mb-6">
            <h1 className="text-2xl font-bold text-gray-800">採用ブラックボックス診断<sup className="text-xs">®</sup></h1>
            <p className="text-sm text-gray-500 mt-1">{isExec ? '上層部問診フォーム' : '事前問診フォーム'}</p>
          </div>
          {isExec ? (
            <div className="p-5 bg-purple-50 border border-purple-200 rounded-xl mb-6">
              <h3 className="font-bold text-gray-800 mb-3">上層部の方へ</h3>
              <p className="text-sm text-gray-700 leading-relaxed">本フォームは<span className="font-bold text-purple-700">経営層・管理職の方専用</span>の問診です。貴社の採用方針・ビジョンについてご自身のお考えをそのままお答えください。担当者の方の回答と照合し、組織内の認識ギャップを分析いたします。</p>
              <p className="text-sm text-gray-600 mt-3">所要時間：10〜15分程度</p>
            </div>
          ) : (
            <div className="p-5 bg-gray-50 border border-gray-200 rounded-xl mb-6">
              <h3 className="font-bold text-gray-800 mb-3">本診断について</h3>
              <p className="text-sm text-gray-700 leading-relaxed mb-4">貴社の採用活動における「見えていない課題」を数値化・可視化するための専門ツールです。お打ち合わせ当日に<span className="font-bold text-blue-700">貴社だけの具体的な「解決策」</span>をご提示します。</p>
              <div className="flex flex-col gap-2 text-sm text-gray-700">
                <div className="flex items-center gap-2"><SolidIcon name="clock" className="w-4 h-4 text-blue-500 flex-shrink-0" /><span><span className="font-bold">所要時間：</span>20〜30分程度</span></div>
                <div className="flex items-center gap-2"><SolidIcon name="save" className="w-4 h-4 text-blue-500 flex-shrink-0" /><span><span className="font-bold">途中保存：</span>回答内容は一時保存が可能です。</span></div>
              </div>
            </div>
          )}
          <div className="p-5 bg-blue-50 border border-blue-200 rounded-xl mb-6">
            <h3 className="font-bold text-gray-800 mb-3">情報の取り扱いについて</h3>
            <ul className="text-sm text-gray-700 space-y-2">
              <li className="flex items-start gap-2"><SolidIcon name="dot" className="w-3 h-3 mt-1 text-blue-500 flex-shrink-0" /><span>ご入力いただく情報は、株式会社Gakusapoが<span className="font-bold">厳重に管理</span>し、本診断の目的以外には一切使用いたしません。</span></li>
              <li className="flex items-start gap-2"><SolidIcon name="dot" className="w-3 h-3 mt-1 text-blue-500 flex-shrink-0" /><span>第三者への提供・開示は行いません。</span></li>
            </ul>
          </div>
          <label className={`flex items-start gap-3 p-4 border-2 rounded-xl cursor-pointer transition mb-6 ${privacyAgreed ? 'bg-blue-50 border-blue-400' : 'bg-white border-gray-200 hover:border-blue-300'}`}>
            <input type="checkbox" checked={privacyAgreed} onChange={e => setPrivacyAgreed(e.target.checked)} className="w-5 h-5 mt-0.5 rounded border-gray-300 text-blue-600 cursor-pointer" />
            <span className="text-sm text-gray-800 leading-relaxed">上記の情報の取り扱いについて確認し、<span className="font-bold text-blue-700">個人情報および企業情報の取り扱いに同意</span>のうえ、{isExec ? '上層部問診' : '事前問診'}を開始します。</span>
          </label>
          <button disabled={!privacyAgreed} onClick={() => setStarted(true)}
            className={`btn-ripple w-full py-4 rounded-xl font-bold text-lg transition shadow-lg ${privacyAgreed ? (isExec ? 'bg-gradient-to-r from-purple-600 to-indigo-600 text-white' : 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white') : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
            {isExec ? '上層部問診を開始する' : '事前問診を開始する'}
          </button>
        </div>
      </div>
    );
  }
  
  const currentStepDef = steps[currentStep];
  const nextDisabled = !canProceed || navigating;
  return (
    <div className="max-w-3xl mx-auto px-4 py-6">
      <ProgressBar currentStep={currentStep} totalSteps={steps.length} steps={steps} />
      {currentStepDef?.id === 'companySize' && <StepCompanySize data={data} onChange={d => setData(d)} />}
      {currentStepDef?.id === 'jobType' && <StepJobType data={data} onChange={d => setData(d)} />}
      {currentStepDef?.id === 'target' && <StepTarget data={data} onChange={d => setData(d)} />}
      {currentStepDef?.id === 'method' && <StepMethod data={data} onChange={d => setData(d)} methodMaster={methodMaster} />}
      {currentStepDef?.id === 'challenges' && <StepChallenges data={data} onChange={d => setData(d)} />}
      {currentStepDef?.id === 'staff' && <StepQuestionnaire data={data} onChange={d => setData(d)} roleKey="staff" questions={staffQuestions} title="担当者問診" timerSeconds={900} onQuizActive={setQuizActive} onComplete={() => setData(p => ({...p, staffCompleted: true}))} />}
      {currentStepDef?.id === 'executive' && <StepQuestionnaire data={data} onChange={d => setData(d)} roleKey="executive" questions={executiveQuestions} title="上層部問診" timerSeconds={900} onQuizActive={setQuizActive} onComplete={() => setData(p => ({...p, executiveCompleted: true}))} />}
      {currentStepDef?.id === 'funnel' && <StepFunnel data={data} onChange={d => setData(d)} methodMaster={methodMaster} />}
      {!quizActive && (
        <div className="flex items-center justify-between mt-6 mb-8">
          <button onClick={goPrev} disabled={currentStep === 0} className={`px-4 py-3 rounded-xl font-bold transition ${currentStep === 0 ? 'text-gray-300 cursor-not-allowed' : 'text-gray-600 hover:bg-gray-100'}`}>← 戻る</button>
          <span className="text-sm text-gray-400">{saving ? <span className="flex items-center gap-1.5 text-blue-500"><svg className="w-3.5 h-3.5" style={{animation:'spin 0.8s linear infinite'}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2.5}><circle cx="12" cy="12" r="10" className="opacity-25"/><path d="M4 12a8 8 0 018-8" className="opacity-75"/></svg>保存中...</span> : `${currentStep+1} / ${steps.length}`}</span>
          <button onClick={goNext} disabled={nextDisabled}
            className={`btn-ripple px-6 py-3 rounded-xl font-bold transition shadow-lg flex items-center gap-2 ${nextDisabled ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : currentStep >= steps.length-1 ? 'bg-gradient-to-r from-green-500 to-emerald-600 text-white' : isExec ? 'bg-gradient-to-r from-purple-600 to-indigo-600 text-white' : 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white'}`}>
            {navigating ? (currentStep >= steps.length-1 ? '送信中...' : '保存中...') : currentStep >= steps.length-1 ? <span className="inline-flex items-center gap-1.5">送信する<SolidIcon name="checkCircle" className="w-5 h-5" /></span> : '次へ →'}
          </button>
        </div>
      )}
    </div>
  );
};


ReactDOM.createRoot(document.getElementById('root')).render(<ToastProvider><App /></ToastProvider>);
</script>
</body>
</html>
